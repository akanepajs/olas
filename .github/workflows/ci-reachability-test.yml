name: ci-reachability-test
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Latvian scrape from CI runner
        working-directory: scraper
        run: node run_scrape_lv.mjs 2026-Q2-LV
      - name: Show summary JSON
        working-directory: scraper
        run: cat data/summary/2026-Q2-LV_summary.json
