name: deploy-pages

# Deploy the static site to GitHub Pages via Actions (bypasses the legacy Jekyll
# builder). Runs on human pushes to main and on manual dispatch. Weekly automated
# updates deploy from within weekly-scrape.yml (a GITHUB_TOKEN push does not
# trigger this workflow).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
